<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sana Akhtar – Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0A1628;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      background: #00C2B2;
    }
    .bg-circle.c1 { width: 600px; height: 600px; top: -200px; right: -150px; }
    .bg-circle.c2 { width: 400px; height: 400px; bottom: -100px; left: -100px; }

    .card {
      text-align: center;
      padding: 60px 50px;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }
    .avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 4px solid #00C2B2;
      outline: 2px solid #FFD166;
      outline-offset: 5px;
      margin: 0 auto 24px;
      background: #1C2B3A;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }
    h1 span { color: #00C2B2; }
    .role {
      margin: 10px 0 6px;
      font-size: 1rem;
      color: #FFD166;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sub {
      font-size: 0.9rem;
      color: #8A9BAD;
      margin-bottom: 36px;
    }
    .badge {
      display: inline-block;
      background: #00C2B2;
      color: #0A1628;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 8px 22px;
      border-radius: 50px;
      margin-bottom: 36px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,194,178,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(0,194,178,0); }
    }
    .divider {
      width: 60px; height: 3px;
      background: #00C2B2;
      margin: 0 auto 28px;
      border-radius: 2px;
    }
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 36px;
    }
    .skill-tag {
      background: #1C2B3A;
      border: 1px solid #00C2B2;
      color: #00C2B2;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
    }
    .contact a {
      color: #8A9BAD;
      text-decoration: none;
      font-size: 0.85rem;
      margin: 0 10px;
      transition: color 0.2s;
    }
    .contact a:hover { color: #00C2B2; }
    .footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #3A4A5A;
    }
  </style>
</head>
<body>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>

  <div class="card">
    <div class="avatar">👩‍💻</div>

    <h1>Sana <span>Akhtar</span></h1>
    <p class="role">Frontend Developer · UI/UX Designer · Artist</p>
    <p class="sub">Ajman, United Arab Emirates</p>

    <div class="badge">🚀 Portfolio Coming Soon</div>

    <div class="divider"></div>

    <div class="skills">
      <span class="skill-tag">HTML & CSS</span>
      <span class="skill-tag">JavaScript</span>
      <span class="skill-tag">UI/UX Design</span>
      <span class="skill-tag">Figma</span>
      <span class="skill-tag">Frontend Dev</span>
      <span class="skill-tag">Artwork</span>
      <span class="skill-tag">Python</span>
      <span class="skill-tag">Creative Computing</span>
    </div>

    <div class="contact">
      <a href="mailto:sanaakhtarx1@gmail.com">✉ sanaakhtarx1@gmail.com</a>
      <a href="tel:+971504619943">☎ +971504619943</a>
    </div>

    <p class="footer">© 2025 Sana Akhtar Muhammad Akhtar</p>
  </div>
</body>
</html>
